{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Chat with {{ other.username }}</title>
    <link rel="stylesheet" href="{% static 'messaging/chat.css' %}">
</head>
<body>
  <h2>Chat with {{ other.username }}</h2>
  <a href="{% url 'inbox' %}">← Back</a>

  <div style="border:1px solid #ccc; padding:1rem; max-height:400px; overflow-y:auto;">
    {% for msg in messages %}
      <p>
        <strong>{{ msg.sender.username }}</strong>
        <small>{{ msg.timestamp|date:"H:i" }}</small><br>
        {{ msg.body }}
      </p>
    {% empty %}
      <p>No messages yet. Say hello!</p>
    {% endfor %}
  </div>

  <form method="post">
    {% csrf_token %}
    <textarea name="body" rows="3" placeholder="Type a message…" style="width:100%"></textarea><br>
    <button type="submit">Send</button>
  </form>
</body>
</html>
